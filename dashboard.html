<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">

<!-- 🔹 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">Dashboard</span>

        <div class="ms-auto">
            <a href="index.html" class="btn btn-outline-light">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </div>
</nav>

<!-- 🔹 Main Content -->
<div class="container mt-5">

    <!-- Welcome Card -->
    <div class="card shadow p-4 mb-4">
        <h4 class="fw-bold">Welcome, User 👋</h4>
        <p class="text-muted">Here is your task summary</p>
    </div>

    <!-- Stats Cards -->
    <div class="row text-center g-4">

        <!-- Total Tasks -->
        <div class="col-md-4">
            <div class="card p-4 shadow h-100">
                <h5 class="mb-2">Total Tasks</h5>
                <h2 class="text-primary fw-bold">12</h2>
                <p class="text-muted mb-0">All assigned tasks</p>
            </div>
        </div>

        <!-- Completed -->
        <div class="col-md-4">
            <div class="card p-4 shadow h-100">
                <h5 class="mb-2">Completed</h5>
                <h2 class="text-success fw-bold">8</h2>
                <p class="text-muted mb-0">Tasks finished</p>
            </div>
        </div>

        <!-- Pending -->
        <div class="col-md-4">
            <div class="card p-4 shadow h-100">
                <h5 class="mb-2">Pending</h5>
                <h2 class="text-danger fw-bold">4</h2>
                <p class="text-muted mb-0">Tasks remaining</p>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
