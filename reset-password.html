<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gradient">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4 p-md-5 w-100" style="max-width: 400px;">
        <h3 class="text-center mb-4">Reset Password</h3>

        <div class="mb-3 position-relative">
            <input type="password" id="pass" class="form-control" placeholder="New Password">
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3" onclick="toggle('pass',this)"></i>
        </div>

        <button class="btn btn-primary w-100">Update Password</button>

        <div class="text-center mt-3">
            <a href="index.html">Back</a>
        </div>
    </div>
</div>

<script>
function toggle(id,icon){
 let x=document.getElementById(id);
 x.type = x.type==="password"?"text":"password";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
